name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p cargo-proofrun

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          ARCH="$(printf '%s' '${{ runner.arch }}' | tr '[:upper:]' '[:lower:]')"

          if [[ "${{ matrix.platform }}" != "windows" ]]; then
            tar -czf "dist/cargo-proofrun-${VERSION}-${{ matrix.platform }}-${ARCH}.tar.gz" -C target/release cargo-proofrun
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Type Directory -Force dist | Out-Null
          $version = "${env:GITHUB_REF_NAME}"
          $arch = "${{ runner.arch }}".ToLowerInvariant()
          Compress-Archive -Path "target/release/cargo-proofrun.exe" -DestinationPath "dist/cargo-proofrun-$version-${{ matrix.platform }}-$arch.zip"

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: cargo-proofrun-${{ matrix.platform }}-${{ runner.arch }}
          path: dist/*

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cargo-proofrun-*
          merge-multiple: true

      - name: Publish crates
        if: secrets.CARGO_REGISTRY_TOKEN != ''
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          PROOFRUN_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/proofrun/Cargo.toml | head -n1)"
          cargo publish --token "$CARGO_REGISTRY_TOKEN" -p proofrun
          bash scripts/wait-for-crates-io-version.sh proofrun "$PROOFRUN_VERSION" 300 10
          cargo publish --token "$CARGO_REGISTRY_TOKEN" -p cargo-proofrun

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
